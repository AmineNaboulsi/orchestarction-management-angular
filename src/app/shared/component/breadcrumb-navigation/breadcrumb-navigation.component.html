<nav class="flex items-center space-x-2 text-sm text-gray-600 mb-6">
  <ng-container *ngFor="let item of items; let last = last">
    <ng-container *ngIf="item.url && !last">
      <a [routerLink]="item.url" class="font-medium text-gray-800 hover:underline flex items-center space-x-1">
        <svg *ngIf="item.icon === 'home'" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
        </svg>
        <span>{{ item.label }}</span>
      </a>
    </ng-container>

    <span *ngIf="!item.url || last" class="text-gray-500">
      {{ item.label }}
    </span>

    <svg *ngIf="!last" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    </svg>
  </ng-container>
</nav>
