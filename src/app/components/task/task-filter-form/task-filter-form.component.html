<div class="p-6 container-fluid mb-4 rounded-3xl bg-gradient-to-tr from-zinc-50 to-gray-50 mx-auto ng-star-inserted">
  <!-- form filter-->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <!-- Process Definition Key -->
      <div>
        <label class="flex items-center text-sm font-medium text-gray-700 mb-2">
          <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          Process Definition Key
        </label>
        <input 
          type="text" 
          placeholder="Enter process definition key" 
          class="bg-white w-full px-6 py-2 border border-gray-300 rounded-3xl placeholder-gray-500 shadow-sm focus:outline-none focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="filter.processDefinitionKey">
      </div>

      <!-- Task ID -->
      <div>
        <label class="flex items-center text-sm font-medium text-gray-700 mb-2">
          <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
          </svg>
          Task ID
        </label>
        <input 
          type="text" 
          placeholder="Enter task ID" 
          class="bg-white w-full px-6 py-2 border border-gray-300 rounded-3xl shadow-sm placeholder-gray-500 focus:outline-none focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="filter.taskId">
      </div>

      <!-- Task Name -->
      <div>
        <label class="flex items-center text-sm font-medium text-gray-700 mb-2">
          <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path>
          </svg>
          Task Name
        </label>
        <input 
          type="text" 
          placeholder="Enter task name" 
          class="bg-white w-full px-6 py-2 border border-gray-300 rounded-3xl shadow-sm placeholder-gray-500 focus:outline-none focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="filter.taskName">
      </div>

      <!-- Assignee ID -->
      <div>
        <label class="flex items-center text-sm font-medium text-gray-700 mb-2">
          <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
          </svg>
          Assignee ID
        </label>
        <input 
          type="text" 
          placeholder="Enter assignee ID" 
          class="bg-white w-full px-6 py-2 border border-gray-300 rounded-3xl shadow-sm placeholder-gray-500 focus:outline-none focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="filter.assigneeId">
      </div>

      <!-- User ID -->
      <div>
        <label class="flex items-center text-sm font-medium text-gray-700 mb-2">
          <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          User ID
        </label>
        <input 
          type="text" 
          placeholder="Enter user ID" 
          class="bg-white w-full px-6 py-2 border border-gray-300 rounded-3xl shadow-sm placeholder-gray-500 focus:outline-none focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="filter.userId">
      </div>

      <!-- Business Key -->
      <div>
        <label class="flex items-center text-sm font-medium text-gray-700 mb-2">
          <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
          </svg>
          Business Key
        </label>
        <input 
          type="text" 
          placeholder="Enter business key" 
          class="bg-white w-full px-6 py-2 border border-gray-300 rounded-3xl shadow-sm placeholder-gray-500 focus:outline-none focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="filter.businessKey">
      </div>

      <!-- Group IDs -->
      <div>
        <label class="flex items-center text-sm font-medium text-gray-700 mb-2">
          <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>
          Group IDs (comma-separated)
        </label>
        <input 
          type="text" 
          placeholder="Enter group IDs separated by commas" 
          class="bg-white w-full px-6 py-2 border border-gray-300 rounded-3xl shadow-sm placeholder-gray-500 focus:outline-none focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="groupIdsString">
      </div>

      <!-- Start Date -->
      <div>
        <label class="flex items-center text-sm font-medium text-gray-700 mb-2">
          <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          Start Date
        </label>
        <input 
          type="datetime-local" 
          class="bg-white w-full px-6 py-2 border border-gray-300 rounded-3xl shadow-sm placeholder-gray-500 focus:outline-none focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="filter.startDate">
      </div>

      <!-- End Date -->
      <div>
        <label class="flex items-center text-sm font-medium text-gray-700 mb-2">
          <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          End Date
        </label>
        <input 
          type="datetime-local" 
          class="w-full px-6 py-2 border border-gray-300 rounded-3xl placeholder-gray-500  shadow-sm focus:outline-none focus:ring-teal-500 focus:border-teal-500"
          [(ngModel)]="filter.endDate">
      </div>
  </div>
  
  <!-- Filter Actions -->
  <div class="flex justify-end space-x-3 mt-6">
      <button 
        class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-3xl shadow-sm text-sm font-medium text-white bg-[#00908E] "
        (click)="clearFilters()">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
        Clear Filters
      </button>
      <button 
        class="inline-flex items-center px-4 py-2 border border-transparent rounded-3xl shadow-sm text-sm font-medium text-white bg-[#094259] "
        (click)="applyFilters()">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        Search
      </button>

  </div> 
</div>
