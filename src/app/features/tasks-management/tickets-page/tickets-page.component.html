<div class="p-6">
  <!-- Breadcrumb Navigation -->
   <app-breadcrumb-navigation
      [items]="[
        { label: 'Tasks', url: '/tasks', icon: 'home' },
        { label: 'Task Management' }
      ]">
   </app-breadcrumb-navigation>

  <!-- Header Section -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold text-gray-900">
      {{ 'TASK.TITLE' | translate }}</h1>
    <div class="flex items-center space-x-3">
      <!-- Toggle Filters Button -->
      <app-button-show-hide-filter
        (toggleFilters)="toggleFilters($event)">
      </app-button-show-hide-filter>
      <!-- -->
     <button 
        class="inline-flex items-center px-4 py-1 border border-gray-300 rounded-2xl shadow-sm text-sm font-medium text-[#00908E] bg-[#F8F8F8] hover:bg-gray-50 hover:scale-105 transition-all cursor-pointer"
        (click)="createNewTask()">
        <svg class="w-4 h-4 mr-2 text-[#00908E]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        {{ 'TASK.DASHBOARD.PAGE.CREATETASK' | translate}}
      </button>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="error" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-md">
    <div class="flex">
      <svg class="w-5 h-5 text-red-400 mr-2" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
      </svg>
      <p class="text-red-800">{{ error }}</p>
    </div>
  </div>

  <!-- Filters Section -->
  <div *ngIf="showFilters" >
    <app-task-filter-form
        [filter]="filter"
        [groupIdsString]="groupIdsString"
        (Search)="applyFilters()"
        (ClearFilters)="clearFilters()">
      </app-task-filter-form>
  </div>

  <div *ngIf="!loading">
    <div *ngIf="tasks?.entities && tasks?.entities?.length; else noTasks" class="space-y-4">
      <div class="relative overflow-x-auto min-w-full divide-y divide-gray-200 border border-gray-200 rounded">
        <app-task-table
          [tasks]="tasks">
        </app-task-table>
    </div>

    </div>

    <ng-template #noTasks>
      <div class="text-center py-12 bg-white rounded-lg border border-gray-200">
        <div class="text-gray-400 mb-4">
          <svg class="mx-auto h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <p class="text-lg text-gray-600 mb-4">{{'APP_BUTTONS.NORESULTAT' | translate}}</p>
        <button 
          class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500"
          (click)="clearFilters()">
          {{'APP_BUTTONS.CLEARFILTER' | translate}}
        </button>
      </div>
    </ng-template>
  </div>
          <p-toast position="top-right" [life]="5000" [style]="{ 'z-index': '9999' }">
          </p-toast>
  <div *ngIf="loading && !error">
    <app-simple-loading-mini></app-simple-loading-mini>
  </div>
    <app-pagination
      [totalItems]="totalTasks"
      [totalElements]="getTotalElements()"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 20, 50]"
      [ItemName]="'tasks'"
      (pageChange)="onPagination($event)">
    </app-pagination>
</div>
