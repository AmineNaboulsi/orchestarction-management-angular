<!-- bpmn-deploy.component.html -->
<div class="min-h-screen bg-gray-50 py-8 px-4 sm:px-6 lg:px-8">
  <div class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <div class="bg-blue-100 p-3 rounded-full">
          <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
          </svg>
        </div>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Deploy BPMN Process</h1>
      <p class="text-gray-600">Upload and deploy your BPMN files to Camunda</p>
    </div>

    <!-- Main Card -->
    <div class="bg-white shadow-xl rounded-lg overflow-hidden">
      <form (ngSubmit)="onSubmit()" #deployForm="ngForm" class="p-6 space-y-6">
        
        <!-- Deployment Name -->
        <div class="space-y-2">
          <label for="deploymentName" class="block text-sm font-medium text-gray-700">
            Deployment Name
            <span class="text-red-500">*</span>
          </label>
          <input 
            type="text" 
            id="deploymentName"
            class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out"
            [(ngModel)]="deploymentForm.deploymentName"
            name="deploymentName"
            required
            placeholder="e.g., tickets-process-base"
            [disabled]="isLoading"
            [class.border-red-300]="deployForm.submitted && !deploymentForm.deploymentName.trim()"
            [class.focus:ring-red-500]="deployForm.submitted && !deploymentForm.deploymentName.trim()"
            [class.focus:border-red-500]="deployForm.submitted && !deploymentForm.deploymentName.trim()">
        </div>

        <!-- Process File Name -->
        <div class="space-y-2">
          <label for="processFileName" class="block text-sm font-medium text-gray-700">
            Process File Name
            <span class="text-red-500">*</span>
          </label>
          <input 
            type="text" 
            id="processFileName"
            class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out"
            [(ngModel)]="deploymentForm.processFileName"
            name="processFileName"
            required
            placeholder="e.g., tickets-process.bpmn"
            [disabled]="isLoading"
            [class.border-red-300]="deployForm.submitted && !deploymentForm.processFileName.trim()"
            [class.focus:ring-red-500]="deployForm.submitted && !deploymentForm.processFileName.trim()"
            [class.focus:border-red-500]="deployForm.submitted && !deploymentForm.processFileName.trim()">
        </div>

        <!-- Tenant ID -->
        <div class="space-y-2">
          <label for="tenantId" class="block text-sm font-medium text-gray-700">
            Tenant ID
            <span class="text-red-500">*</span>
          </label>
          <input 
            type="text" 
            id="tenantId"
            class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out"
            [(ngModel)]="deploymentForm.tenantId"
            name="tenantId"
            required
            placeholder="e.g., FSYS"
            [disabled]="isLoading"
            [class.border-red-300]="deployForm.submitted && !deploymentForm.tenantId.trim()"
            [class.focus:ring-red-500]="deployForm.submitted && !deploymentForm.tenantId.trim()"
            [class.focus:border-red-500]="deployForm.submitted && !deploymentForm.tenantId.trim()">
        </div>

        <!-- Request ID -->
        <div class="space-y-2">
          <label for="requestId" class="block text-sm font-medium text-gray-700">Request ID</label>
          <div class="flex">
            <input 
              type="text" 
              id="requestId"
              class="flex-1 px-3 py-2 border border-gray-300 rounded-l-md shadow-sm bg-gray-50 text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              [(ngModel)]="deploymentForm.requestId"
              name="requestId"
              readonly
              [disabled]="isLoading">
            <button 
              type="button" 
              class="px-4 py-2 bg-gray-600 text-white rounded-r-md hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 transition duration-150 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed"
              (click)="generateNewRequestId()"
              [disabled]="isLoading">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- Canal -->
        <div class="space-y-2">
          <label for="canal" class="block text-sm font-medium text-gray-700">Canal</label>
          <select 
            id="canal"
            class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out"
            [(ngModel)]="deploymentForm.canal"
            name="canal"
            [disabled]="isLoading">
            <option value="web-user">Web User</option>
            <option value="admin-user">Admin User</option>
            <option value="test-user">Test User</option>
          </select>
        </div>

        <!-- File Upload -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-700">
            BPMN File
            <span class="text-red-500">*</span>
          </label>
          
          <!-- Drop Zone -->
          <div 
            class="relative border-2 border-dashed rounded-lg p-6 transition-colors duration-200 ease-in-out"
            [class.border-blue-400]="isDragOver"
            [class.bg-blue-50]="isDragOver"
            [class.border-gray-300]="!isDragOver"
            [class.hover:border-gray-400]="!isDragOver && !isLoading"
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)">
            
            <input 
              type="file" 
              id="bpmnFile"
              class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
              accept=".bpmn"
              (change)="onFileSelected($event)"
              [disabled]="isLoading">
            
            <div class="text-center">
              <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <div class="mt-4">
                <p class="text-sm text-gray-600">
                  <span class="font-medium text-blue-600 hover:text-blue-500">Click to upload</span>
                  or drag and drop
                </p>
                <p class="text-xs text-gray-500 mt-1">BPMN files only</p>
              </div>
            </div>
          </div>
          
          <!-- Selected File Display -->
          <div *ngIf="selectedFile" class="mt-3 bg-blue-50 border border-blue-200 rounded-md p-3">
            <div class="flex items-center justify-between">
              <div class="flex items-center space-x-3">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                <div>
                  <p class="text-sm font-medium text-blue-900">{{ selectedFile.name }}</p>
                  <p class="text-xs text-blue-600">{{ (selectedFile.size / 1024).toFixed(1) }} KB</p>
                </div>
              </div>
              <button 
                type="button"
                class="text-red-600 hover:text-red-800 transition-colors duration-150"
                (click)="removeFile()"
                [disabled]="isLoading">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-md p-4">
          <div class="flex">
            <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <div class="ml-3">
              <p class="text-sm text-red-800">{{ errorMessage }}</p>
            </div>
          </div>
        </div>

        <!-- Success Message -->
        <div *ngIf="deploymentResult?.success" class="bg-green-50 border border-green-200 rounded-md p-4">
          <div class="flex">
            <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <div class="ml-3">
              <p class="text-sm text-green-800">{{ deploymentResult?.message }}</p>
              <div *ngIf="deploymentResult?.deploymentId" class="mt-2">
                <p class="text-xs text-green-700">
                  <span class="font-medium">Deployment ID:</span> {{ deploymentResult?.deploymentId }}
                </p>
              </div>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-3 pt-6 border-t border-gray-200">
          <button 
            type="submit" 
            class="flex-1 flex justify-center items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition duration-150 ease-in-out"
            [disabled]="isLoading || !deployForm.form.valid || !selectedFile">
            <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <svg *ngIf="!isLoading" class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            {{ isLoading ? 'Deploying...' : 'Deploy Process' }}
          </button>
          
          <button 
            type="button" 
            class="flex-1 flex justify-center items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition duration-150 ease-in-out"
            (click)="resetForm()"
            [disabled]="isLoading">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            Reset Form
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
