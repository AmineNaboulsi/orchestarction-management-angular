<div class="p-6">
  <!-- Breadcrumb Navigation -->
  <app-breadcrumb-navigation
      [items]="[
        { label: 'Process', url: '/process', icon: 'home' },
        { label: 'Process Management' }
      ]">
   </app-breadcrumb-navigation>

  <!-- Header Section -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-semibold text-gray-900">Process Management</h1>
    <div class="flex items-center space-x-3">
      <app-button-show-hide-filter
        (toggleFilters)="toggleFilters($event)">
      </app-button-show-hide-filter>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="error" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-md">
    <div class="flex">
      <svg class="w-5 h-5 text-red-400 mr-2" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
      </svg>
      <p class="text-red-800">{{ error }}</p>
    </div>
  </div>

  <!-- Filters Section -->
  <div *ngIf="showFilters" >
    <app-process-filter-form
      [filter]="filter"
      (Search)="applyFilters()"
      (ClearFilters)="clearFilters()">

    </app-process-filter-form>

  </div>

  <!-- Processes List -->
  <div *ngIf="!loading">

    <!-- No Processes Template -->
    <ng-template #noProcesses>
      <div class="text-center py-12 bg-white rounded-lg border border-gray-200">
        <div class="text-gray-400 mb-4">
          <svg class="mx-auto h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <p class="text-lg text-gray-600 mb-4">No processes found matching your criteria.</p>
        <button
          class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500"
          (click)="clearFilters()">
          Clear Filters
        </button>
      </div>
    </ng-template>
  </div>
  <div *ngIf="!loading">
    <div *ngIf="processes?.entities && processes?.entities?.length; else noTasks" class="space-y-4">
      <div class="overflow-x-auto bg-white shadow-sm rounded-lg">
        <app-process-table
        [processes]="processes"
        [loading]="loading"
        [error]="error"
        (enventHandlerRefresh)="EnventHandlerRefresh($event)"
        >
        </app-process-table>
    </div>

    </div>

    <ng-template #noTasks>
      <div class="text-center py-12 bg-white rounded-lg border border-gray-200">
        <div class="text-gray-400 mb-4">
          <svg class="mx-auto h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <p class="text-lg text-gray-600 mb-4">{{'APP_BUTTONS.NORESULTAT' | translate}}</p>
        <button 
          class="inline-flex items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500"
          (click)="clearFilters()">
          {{'APP_BUTTONS.CLEARFILTER' | translate}}
        </button>
      </div>
    </ng-template>
  </div>
  <div *ngIf="loading" class="text-center py-12">
    <!--Loading processes...-->
    <app-simple-loading-mini></app-simple-loading-mini>
  </div>
  <app-pagination
      [totalItems]="totalProcess"
      [totalElements]="getTotalElements()"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 20, 50]"
      [ItemName]="'process'"
      (pageChange)="onPagination($event)">
  </app-pagination>

</div>
